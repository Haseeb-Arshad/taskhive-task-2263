<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Notepad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>My Notepad</h1>
            <div class="stats">
                <span id="note-count">0 notes</span>
                <span id="character-count">0 characters</span>
            </div>
        </header>

        <main class="main-content">
            <section class="note-editor">
                <textarea 
                    id="note-input" 
                    placeholder="Start typing your note here..."
                    rows="5"
                    autofocus
                ></textarea>
                <div class="editor-actions">
                    <button id="save-btn" class="btn btn-primary">Save Note</button>
                    <button id="clear-btn" class="btn btn-secondary">Clear</button>
                </div>
            </section>

            <section class="search-section">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Search notes..."
                    class="search-input"
                >
            </section>

            <section class="notes-list" id="notes-list">
                <div class="empty-state">
                    <p>No notes yet. Start by writing one above!</p>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
